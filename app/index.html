<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project Pulse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header"><h1>Project Pulse</h1></header>
  <main class="dashboard" id="dashboard" aria-live="polite">
    <p class="loading">Loading projects</p>
  </main>

  <script>
  async function render() {
    try {
      const res = await fetch('project-data.json');
      if (!res.ok) throw new Error('Failed to load data');
      const data = await res.json();
      const container = document.getElementById('dashboard');
      if (!data.projects || !data.projects.length) {
        container.innerHTML = '<p class="empty">No projects found.</p>'; 
        return;
      }
      container.innerHTML = '';
      data.projects.forEach(p => {
        const card = document.createElement('article');
        card.className = 'project-card';
        card.innerHTML = `
          <h2 class="project-name">${escapeHtml(p.name)}</h2>
          <p class="project-meta"><strong>Owner:</strong> ${escapeHtml(p.owner)}</p>
          <p class="project-meta"><strong>Status:</strong> <span class="status">${escapeHtml(p.status)}</span></p>
          <p class="project-meta"><strong>Recent:</strong> ${escapeHtml(p.recentActivity)}</p>
          <p class="project-priority"><strong>Priority:</strong> ${escapeHtml(p.priority)}</p>
        `;
        container.appendChild(card);
      });
    } catch (e) {
      document.getElementById('dashboard').innerHTML = '<p class="error">Could not load project data.</p>';
      console.error(e);
    }
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  render();
  </script>
</body>
</html>
